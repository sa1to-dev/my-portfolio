<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>学習ログ保存</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; }
    textarea { width: 100%; height: 80px; margin-bottom: 10px; }
    button { padding: 5px 10px; margin-right: 5px; }
    .log { border-bottom: 1px solid #ccc; padding: 5px 0; }
  </style>
</head>
<body>
  <h1>学習ログ</h1>

  <label for="day">Day番号:</label>
  <input type="number" id="day" min="1" placeholder="例: 1">
  <br><br>

  <textarea id="note" placeholder="今日の学習内容を入力"></textarea>
  <br>
  <button id="saveBtn">保存</button>
  <button id="clearBtn">クリア</button>

  <h2>保存済みログ</h2>
  <div id="logs"></div>

  <script>
    const dayInput = document.getElementById("day");
    const noteInput = document.getElementById("note");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");
    const logsDiv = document.getElementById("logs");

    // 保存ボタン
    saveBtn.addEventListener("click", () => {
      const day = dayInput.value;
      const note = noteInput.value;
      if(!day || !note) {
        alert("Day番号と内容を入力してください");
        return;
      }

      // localStorageに保存
      localStorage.setItem("day" + day, note);
      displayLogs();
      noteInput.value = "";
    });

    // クリアボタン
    clearBtn.addEventListener("click", () => {
      localStorage.clear();
      displayLogs();
    });

    // 表示関数
    function displayLogs() {
      logsDiv.innerHTML = "";
      // 保存済みのkeyを全部チェック
      for(let i=0; i<localStorage.length; i++){
        const key = localStorage.key(i);
        const value = localStorage.getItem(key);
        const div = document.createElement("div");
        div.className = "log";
        div.textContent = key + ": " + value;
        logsDiv.appendChild(div);
      }
    }

    // 最初に表示
    displayLogs();
  </script>
</body>
</html>
